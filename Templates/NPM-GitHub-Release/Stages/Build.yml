parameters:
  - name: stageName
    type: string
    default: 'Build'
  - name: vmImage
    type: string
    default: 'ubuntu-latest'
  - name: globalVariableTemplatePath
    type: string
    default: '/pipeline/variables/global.yml'
  - name: buildVariableTemplatePath
    type: string
    default: '/pipeline/variables/build.yml'
  - name: versionOverride
    type: string
    default: 'auto'
  - name: useSourceTagNameForVersion
    type: boolean
    default: false
  - name: preBuildSteps
    type: stepList
    default: []
  - name: postBuildSteps
    type: stepList
    default: []
  # Security scanning parameters.
  - name: runSecurityScan
    type: boolean
    default: true
  - name: runNpmAudit
    type: boolean
    default: true
  - name: npmAuditLevel
    type: string
    default: 'high'
  - name: runSast
    type: boolean
    default: true
  - name: sastConfig
    type: string
    default: 'p/typescript p/security-audit'
  - name: runSecretScan
    type: boolean
    default: true

stages:
  - stage: ${{ parameters.stageName }}
    displayName: 'Build, Test, Pack & Scan'
    jobs:
      # Job 1: Build — validates compilation.
      - template: ../Jobs/Build.yml
        parameters:
          vmImage: ${{ parameters.vmImage }}
          globalVariableTemplatePath: ${{ parameters.globalVariableTemplatePath }}
          buildVariableTemplatePath: ${{ parameters.buildVariableTemplatePath }}
          versionOverride: ${{ parameters.versionOverride }}
          useSourceTagNameForVersion: ${{ parameters.useSourceTagNameForVersion }}
          preBuildSteps: ${{ parameters.preBuildSteps }}

      # Job 2: Test — runs after Build succeeds.
      - template: ../Jobs/Test.yml
        parameters:
          vmImage: ${{ parameters.vmImage }}
          globalVariableTemplatePath: ${{ parameters.globalVariableTemplatePath }}
          buildVariableTemplatePath: ${{ parameters.buildVariableTemplatePath }}

      # Job 3: Package — runs after Test succeeds, publishes artifact.
      - template: ../Jobs/Package.yml
        parameters:
          vmImage: ${{ parameters.vmImage }}
          globalVariableTemplatePath: ${{ parameters.globalVariableTemplatePath }}
          buildVariableTemplatePath: ${{ parameters.buildVariableTemplatePath }}
          versionOverride: ${{ parameters.versionOverride }}
          useSourceTagNameForVersion: ${{ parameters.useSourceTagNameForVersion }}
          postBuildSteps: ${{ parameters.postBuildSteps }}

      # Job 4: Security Scan — runs in parallel with all other jobs.
      - ${{ if eq(parameters.runSecurityScan, true) }}:
        - template: ../Jobs/SecurityScan.yml
          parameters:
            vmImage: ${{ parameters.vmImage }}
            globalVariableTemplatePath: ${{ parameters.globalVariableTemplatePath }}
            buildVariableTemplatePath: ${{ parameters.buildVariableTemplatePath }}
            runNpmAudit: ${{ parameters.runNpmAudit }}
            npmAuditLevel: ${{ parameters.npmAuditLevel }}
            runSast: ${{ parameters.runSast }}
            sastConfig: ${{ parameters.sastConfig }}
            runSecretScan: ${{ parameters.runSecretScan }}
