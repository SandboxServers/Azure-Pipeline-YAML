parameters:
  - name: globalVariableTemplatePath
    type: string
    default: '/pipeline/variables/global.yml'
  - name: buildVariableTemplatePath
    type: string
    default: '/pipeline/variables/build.yml'
  - name: environmentVariableTemplateDirectory
    type: string
    default: '/pipeline/variables'
  - name: vmImage
    type: string
    default: 'ubuntu-latest'
  - name: environments
    type: object
    default:
      - dev
  - name: versionOverride
    type: string
    default: 'auto'
  - name: useSourceTagNameForVersion
    type: boolean
    default: false
  - name: buildStageName
    type: string
    default: 'Build'
  - name: releaseStageName
    type: string
    default: 'Release'
  - name: preBuildSteps
    type: stepList
    default: []
  - name: postBuildSteps
    type: stepList
    default: []
  - name: preReleaseSteps
    type: stepList
    default: []
  - name: postReleaseSteps
    type: stepList
    default: []
  # Security scanning parameters — passed through to the Build stage.
  # All scanners are enabled by default. Consumers can disable or tune them.
  - name: runSecurityScan
    type: boolean
    default: true
  - name: runNpmAudit
    type: boolean
    default: true
  - name: npmAuditLevel
    type: string
    default: 'high'
  - name: runSast
    type: boolean
    default: true
  - name: sastConfig
    type: string
    default: 'p/typescript p/security-audit'
  - name: runSecretScan
    type: boolean
    default: true
  # Test reporting parameters — passed through to the Build stage.
  - name: publishTestResults
    type: boolean
    default: true
  - name: publishCodeCoverage
    type: boolean
    default: true
  # Release gating — passed through to the Release stage.
  # createRelease: false skips the stage entirely (build/test/pack only).
  # releaseType: overrides the env-file isDraft/isPreRelease defaults at queue time.
  #   default   — use environment-file settings (dev.yml/prod.yml)
  #   release   — full public release, overrides env-file
  #   prerelease — prerelease, overrides env-file
  #   draft     — draft release, overrides env-file
  #   tagOnly   — push a git tag only, no GitHub release object
  - name: createRelease
    type: boolean
    default: true
  - name: releaseType
    type: string
    default: 'default'

stages:
  - template: ../Stages/Build.yml
    parameters:
      stageName: ${{ parameters.buildStageName }}
      vmImage: ${{ parameters.vmImage }}
      globalVariableTemplatePath: ${{ parameters.globalVariableTemplatePath }}
      buildVariableTemplatePath: ${{ parameters.buildVariableTemplatePath }}
      versionOverride: ${{ parameters.versionOverride }}
      useSourceTagNameForVersion: ${{ parameters.useSourceTagNameForVersion }}
      preBuildSteps: ${{ parameters.preBuildSteps }}
      postBuildSteps: ${{ parameters.postBuildSteps }}
      runSecurityScan: ${{ parameters.runSecurityScan }}
      runNpmAudit: ${{ parameters.runNpmAudit }}
      npmAuditLevel: ${{ parameters.npmAuditLevel }}
      runSast: ${{ parameters.runSast }}
      sastConfig: ${{ parameters.sastConfig }}
      runSecretScan: ${{ parameters.runSecretScan }}
      publishTestResults: ${{ parameters.publishTestResults }}
      publishCodeCoverage: ${{ parameters.publishCodeCoverage }}

  - template: ../Stages/Release.yml
    parameters:
      stageName: ${{ parameters.releaseStageName }}
      dependsOn:
        - ${{ parameters.buildStageName }}
      vmImage: ${{ parameters.vmImage }}
      globalVariableTemplatePath: ${{ parameters.globalVariableTemplatePath }}
      environmentVariableTemplateDirectory: ${{ parameters.environmentVariableTemplateDirectory }}
      environments: ${{ parameters.environments }}
      versionOverride: ${{ parameters.versionOverride }}
      useSourceTagNameForVersion: ${{ parameters.useSourceTagNameForVersion }}
      preReleaseSteps: ${{ parameters.preReleaseSteps }}
      postReleaseSteps: ${{ parameters.postReleaseSteps }}
      createRelease: ${{ parameters.createRelease }}
      releaseType: ${{ parameters.releaseType }}
