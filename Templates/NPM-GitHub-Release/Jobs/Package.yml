# Package job for NPM projects.
# Packs the project into a distributable tarball and publishes the pipeline artifact.
# Depends on the Test job so packaging only happens if tests pass.
# Runs: checkout → Node setup → cache restore → install → resolve metadata →
#       version override → pack (lifecycle scripts handle build) → publish artifact.

parameters:
  - name: vmImage
    type: string
    default: 'ubuntu-latest'
  - name: globalVariableTemplatePath
    type: string
    default: '/pipeline/variables/global.yml'
  - name: buildVariableTemplatePath
    type: string
    default: '/pipeline/variables/build.yml'
  - name: versionOverride
    type: string
    default: 'auto'
  - name: useSourceTagNameForVersion
    type: boolean
    default: false
  - name: postBuildSteps
    type: stepList
    default: []

jobs:
  - job: Package
    displayName: 'Package'
    dependsOn: Test
    pool:
      vmImage: ${{ parameters.vmImage }}
    variables:
      - template: ${{ parameters.globalVariableTemplatePath }}@self
      - template: ${{ parameters.buildVariableTemplatePath }}@self
    steps:
      - checkout: self
        fetchDepth: 0
        fetchTags: true

      - download: none

      - template: ../../Standalone/Steps/Node/UseNode.yml
        parameters:
          version: '$(nodeVersion)'
          displayName: 'Use Node.js $(nodeVersion)'

      - ${{ if eq(variables['enableNpmCache'], 'true') }}:
        - template: ../../Standalone/Steps/Cache/Restore.yml
          parameters:
            key: 'npm | "$(Agent.OS)" | $(npmCacheKeyFile)'
            restoreKeys: |
              npm | "$(Agent.OS)"
              npm
            path: '$(npmCacheDirectory)'
            displayName: 'Restore npm cache'

      - template: ../../Standalone/Steps/Npm/ResolvePackageMetadata.yml
        parameters:
          packageJsonPath: '$(Build.SourcesDirectory)/$(packageJsonPath)'
          versionOverride: ${{ parameters.versionOverride }}
          useSourceTagNameForVersion: ${{ parameters.useSourceTagNameForVersion }}
          releaseTitleFormat: '$(releaseTitleFormat)'
          releaseTagFormat: '$(releaseTagFormat)'

      - ${{ if or(ne(parameters.versionOverride, 'auto'), eq(parameters.useSourceTagNameForVersion, true)) }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Apply resolved package version'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'custom'
            customCommand: 'version $(PackageVersion) --no-git-tag-version --allow-same-version --ignore-scripts'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - ${{ if eq(variables['npmInstallCommand'], 'ci') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Install dependencies (npm ci)'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'ci'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - ${{ if eq(variables['npmInstallCommand'], 'install') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Install dependencies (npm install)'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'install'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - ${{ if eq(variables['npmInstallCommand'], 'custom') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Install dependencies (custom npm command)'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'custom'
            customCommand: '$(npmInstallCustomCommand)'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - template: ../../Standalone/Steps/Npm/Pack.yml
        parameters:
          workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
          outputDirectory: '$(Build.ArtifactStagingDirectory)/$(packageArtifactName)'
          releaseNotesPath: '$(Build.ArtifactStagingDirectory)/$(packageArtifactName)/$(releaseNotesFileName)'
          manifestPath: '$(Build.ArtifactStagingDirectory)/$(packageArtifactName)/$(packageManifestFileName)'
          extraArgs: '$(npmPackArgs)'
          dryRun: '$(npmPackDryRun)'
          ignoreScripts: '$(npmPackIgnoreScripts)'
          includeManifest: '$(includePackageManifest)'

      - template: ../../Standalone/Steps/Artifacts/PublishPipelineArtifact.yml
        parameters:
          targetPath: '$(Build.ArtifactStagingDirectory)/$(packageArtifactName)'
          artifactName: '$(packageArtifactName)'
          displayName: 'Publish packaged artifact'

      - ${{ parameters.postBuildSteps }}
