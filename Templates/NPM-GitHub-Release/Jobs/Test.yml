# Test job for NPM projects.
# Runs the test suite after validating compilation.
# Depends on the Build job so tests only run if compilation succeeds.
# Runs: checkout → Node setup → cache restore → install → build → test.

parameters:
  - name: vmImage
    type: string
    default: 'ubuntu-latest'
  - name: globalVariableTemplatePath
    type: string
    default: '/pipeline/variables/global.yml'
  - name: buildVariableTemplatePath
    type: string
    default: '/pipeline/variables/build.yml'

jobs:
  - job: Test
    displayName: 'Test'
    pool:
      vmImage: ${{ parameters.vmImage }}
    variables:
      - template: ${{ parameters.globalVariableTemplatePath }}@self
      - template: ${{ parameters.buildVariableTemplatePath }}@self
    steps:
      - checkout: self
        fetchDepth: 1

      - download: none

      - template: ../../Standalone/Steps/Node/UseNode.yml
        parameters:
          version: '$(nodeVersion)'
          displayName: 'Use Node.js $(nodeVersion)'

      - ${{ if eq(variables['enableNpmCache'], 'true') }}:
        - template: ../../Standalone/Steps/Cache/Restore.yml
          parameters:
            key: 'npm | "$(Agent.OS)" | $(npmCacheKeyFile)'
            restoreKeys: |
              npm | "$(Agent.OS)"
              npm
            path: '$(npmCacheDirectory)'
            displayName: 'Restore npm cache'

      - ${{ if eq(variables['npmInstallCommand'], 'ci') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Install dependencies (npm ci)'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'ci'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - ${{ if eq(variables['npmInstallCommand'], 'install') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Install dependencies (npm install)'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'install'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - ${{ if eq(variables['npmInstallCommand'], 'custom') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Install dependencies (custom npm command)'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'custom'
            customCommand: '$(npmInstallCustomCommand)'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - ${{ if ne(variables['npmBuildCommand'], '') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Build package'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'custom'
            customCommand: '$(npmBuildCommand)'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - ${{ if ne(variables['npmTestCommand'], '') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Run tests'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'custom'
            customCommand: '$(npmTestCommand)'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'
