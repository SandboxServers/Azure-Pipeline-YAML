# Test job for NPM projects.
# Runs the test suite after validating compilation.
# Depends on the Build job so tests only run if compilation succeeds.
# Publishes test results (JUnit) and code coverage (Cobertura) to ADO tabs.
# Runs: checkout → Node setup → cache restore → install → build → test → publish results.

parameters:
  - name: vmImage
    type: string
    default: 'ubuntu-latest'
  - name: globalVariableTemplatePath
    type: string
    default: '/pipeline/variables/global.yml'
  - name: buildVariableTemplatePath
    type: string
    default: '/pipeline/variables/build.yml'
  - name: publishTestResults
    type: boolean
    default: true
  - name: publishCodeCoverage
    type: boolean
    default: true

jobs:
  - job: Test
    displayName: 'Test'
    pool:
      vmImage: ${{ parameters.vmImage }}
    variables:
      - template: ${{ parameters.globalVariableTemplatePath }}@self
      - template: ${{ parameters.buildVariableTemplatePath }}@self
    steps:
      - checkout: self
        fetchDepth: 1

      - download: none

      - template: ../../Standalone/Steps/Node/UseNode.yml
        parameters:
          version: '$(nodeVersion)'
          displayName: 'Use Node.js $(nodeVersion)'

      - ${{ if eq(variables['enableNpmCache'], 'true') }}:
        - template: ../../Standalone/Steps/Cache/Restore.yml
          parameters:
            key: 'npm | "$(Agent.OS)" | $(npmCacheKeyFile)'
            restoreKeys: |
              npm | "$(Agent.OS)"
              npm
            path: '$(npmCacheDirectory)'
            displayName: 'Restore npm cache'

      - ${{ if eq(variables['npmInstallCommand'], 'ci') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Install dependencies (npm ci)'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'ci'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - ${{ if eq(variables['npmInstallCommand'], 'install') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Install dependencies (npm install)'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'install'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - ${{ if eq(variables['npmInstallCommand'], 'custom') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Install dependencies (custom npm command)'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'custom'
            customCommand: '$(npmInstallCustomCommand)'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      - ${{ if ne(variables['npmBuildCommand'], '') }}:
        - template: ../../Standalone/Steps/Npm/Run.yml
          parameters:
            displayName: 'Build package'
            workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            taskCommand: 'custom'
            customCommand: '$(npmBuildCommand)'
            env:
              NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      # Run tests with JUnit reporter and Cobertura coverage output.
      # The test command is extended at runtime to add reporter/coverage flags.
      # If the consumer's npmTestCommand already includes custom reporters, the
      # additional flags merge without conflict.
      - ${{ if ne(variables['npmTestCommand'], '') }}:
        - script: |
            npx vitest run \
              --reporter=default \
              --reporter=junit \
              --outputFile.junit=test-results/junit.xml \
              --coverage \
              --coverage.provider=v8 \
              --coverage.reporter=cobertura \
              --coverage.reporter=text \
              --coverage.reportsDirectory=coverage
          displayName: 'Run tests with coverage'
          workingDirectory: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
          env:
            NPM_CONFIG_CACHE: '$(npmCacheDirectory)'

      # Publish test results to the Tests tab in the pipeline run.
      - ${{ if eq(parameters.publishTestResults, true) }}:
        - task: PublishTestResults@2
          displayName: 'Publish test results'
          condition: always()
          inputs:
            testResultsFormat: 'JUnit'
            testResultsFiles: '**/test-results/junit.xml'
            searchFolder: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)'
            mergeTestResults: true
            testRunTitle: 'Vitest'
            failTaskOnFailedTests: true

      # Publish code coverage to the Code Coverage tab in the pipeline run.
      - ${{ if eq(parameters.publishCodeCoverage, true) }}:
        - task: PublishCodeCoverageResults@2
          displayName: 'Publish code coverage'
          condition: always()
          inputs:
            summaryFileLocation: '$(Build.SourcesDirectory)/$(npmWorkingDirectory)/coverage/cobertura-coverage.xml'
